# Версия конфигурации плагина
# (Ни в коем случае не трогать данный параметр!)
config-version: 2.3

filter:
  # Настройка фильтра запрещённых слов (читы, софт и т.д.)
  blocked-words:
    # Включен ли фильтр? (true/false)
    enabled: false
    # Режим работы:
    #   block-and-notify — полностью блокирует сообщение и отправляет уведомления
    #   replace-and-notify — заменяет каждое запрещённое слово на "*" и отправляет уведомления
    mode: "block-and-notify"
    # Уровень фильтрации слов:
    #   high — фильтрует все слова из списка + производные формы
    #   medium — фильтрует многие слова + производные формы
    #   low — фильтрует только точные совпадения
    # (Рекомендуется оставить "high", так как он самый точный)
    level: "high"
    # Символ замены (Используется только в режиме "send-and-notify")
    replacement: "*"
    # Сохранять первую и последнюю буквы при замене? (true/false)
    #   true — маскируется только середина так, что буква в самом начале и конце видна
    #   false — заменяется всё слово на тот символ, что стоит в "replacement"
    keep-edge-letters: false
    # Игроки или привилегии, у которых не будет работать данный фильтр
    exceptions:
      # Список игроков, которые игнорируются при использовании заблокированных слов
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при использовании заблокированных слов
      groups:
        - "admin"
        - "moderator"

logs:
  file:
    blocked-words:
      # Включен ли параметр? (true/false)
      enabled: true
      # Формат сообщения для логов в файле
      message: "[{time}] Игрок {player} пытался отправить запрещённое слово(а): {words}"
      # Настройка автоматической очистки файла логов
      cleanup:
        # Включен ли параметр? (true/false)
        enabled: true
        # Режим очистки файла логов:
        #   truncate — Полностью очищает файл
        #   remove-oldest — Удаляет строки старше "retention-period"
        #   keep-latest — Сохраняет только последние "max-lines" строк
        mode: "remove-oldest"
        # Максимальное количество строк в файле логов
        max-lines: 10000
        # Период хранения строк в файле логов
        # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
        retention-period: "7d"

notifications:
  blocked-words:
    # Уведомления для самого игрока, который использовал запрещённое слово
    player:
      - "[message] &#FB8808◆ &fСтоять! &#FB8808Не используйте &fзапрещённые слова в сообщениях!"
      - "[title] &#FB8808▶ Стоп-стоп!\n&#FB8808◆ &fТакие слова &#FB8808нельзя &fписать в чат..."
      - "[actionbar] &#FB8808◆ Стоп! &fХватит &#FB8808использовать &fтакие слова в чате!"
      - "[sound] ENTITY_VILLAGER_NO"
    # Уведомления для администраторов
    admin:
      - "[message] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fиспользовал запрещённое слово(а): &#FFA500{words}"
      - "[sound] BLOCK_NOTE_BLOCK_PLING"
    # Уведомления в консоль
    console:
      - "[message-console] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fиспользовал запрещённое слово(а): &#FFA500{words}"
    # Уведомления в Дискорд
    discord:
      # Включить ли отправку уведомлений в Дискорд? (true/false)
      enabled: false
      # Ссылка вебхука Дискорда
      webhook-url: ""
      # Формат сообщения для Дискорда
      message: "» ◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) Игрок `{player}` использовал запрещённое слово(а): `{words}`"

punishments:
  blocked-words:
    # Включены ли наказания за запрещённые слова? (true/false)
    enabled: false
    # Настройка логирования наказаний в файл
    logs:
      # Включить ли запись наказаний в файл? (true/false)
      enabled: true
      # Формат сообщения для логов наказаний
      message: "[{time}] Игрок {player} (нарушений: {violations}, стадия: {stage}) использовал запрещённое слово(а): {words}"
    # Игроки или привилегии, которые не будут получать наказания
    exceptions:
      # Список игроков, которые игнорируются при наказаниях
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при наказаниях
      groups:
        - "admin"
        - "moderator"
    # Пермишен, который позволяет обходить все наказания за запрещённые слова
    bypass-permission: "chatfilterplus.bypass.punishment.blockedwords"
    # Настройка стадий наказаний
    # (В самом начале указывается число, и оно значит то, сколько игрок должен получить уведомления за использование запрещённых слов, чтобы оно сработало)
    stages:
      1:
        actions:
          - "[console-command] kick {player} Использование запрещённых слов ({words})"
      3:
        actions:
          - "[console-command] tempmute {player} 5m Использование запрещённых слов ({words})"
      5:
        actions:
          - "[console-command] tempmute {player} 10m Использование запрещённых слов ({words})"
      7:
        actions:
          - "[console-command] tempmute {player} 20m Использование запрещённых слов ({words})"

# Список запрещённых слов (например, всё, что связано с читами, софтом и т.д.)
blocked-words:
  - нурик
  - нурсултан
  - арбузклиент
  - кфг
  - xray
  - искрей
  - импакт
  - бустит
  - дельта