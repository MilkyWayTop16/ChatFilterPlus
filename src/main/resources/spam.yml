# Версия конфигурации плагина
# (Ни в коем случае не трогать данный параметр!)
config-version: 2.3

filter:
  # Настройка фильтра спама
  spam:
    # Включен ли фильтр спама? (true/false)
    enabled: false

    # Задержка чата для новых игроков (первый заход на сервер)
    # Пока с момента первого входа не прошло указанное время — писать в чат нельзя.
    # (Считается по Player#getFirstPlayed, а не по текущей сессии)
    new-player-chat-lock:
      # Включить ограничение чата для новичков? (true/false)
      enabled: true
      # Сколько нужно отыграть с первого захода, прежде чем писать в чат
      # Единицы времени: s (секунды), m (минуты), h (часы), d (дни)
      # (Например: "5m", "10m", "1h")
      duration: "5m"

    # Задержка между сообщениями
    general-cooldown:
      # Включить общую задержку? (true/false)
      enabled: true
      # Минимальное время между сообщениями игроков (в секундах)
      seconds: 3
      # От скольки символов в сообщении обычная задержка не будет работать
      # (Если установить "-1", то задержка будет всегда, независимо от количества символов в сообщении игрока)
      ignore-if-longer-than: -1
      # Минимальная длина сообщения (в символах), при которой будет работать общая задержка
      # (Если установить "-1", то задержка будет работать всегда)
      min-length: -1

    # Умная защита от похожих сообщений
    similar-message-cooldown:
      # Включить проверку на похожие сообщения? (true/false)
      enabled: true
      # Минимальное время между похожими сообщениями (в секундах)
      seconds: 10
      # Процент сходства, при котором сообщение считается похожим
      similarity-percent: 75
      # От скольки символов в сообщении проверка на похожие сообщения не будет работать
      # (Если установить "-1", то проверка будет всегда, независимо от длины сообщения)
      ignore-if-longer-than: -1
      # Минимальная длина сообщения (в символах), при которой включается проверка на похожесть
      # (Если установить "-1", то проверка будет работать всегда, даже на коротких сообщениях в 1-2 слова)
      min-length: 10

    # Умная защита от разного вида флуда (то есть спама, где в сообщении есть много одинаковых символов)
    character-flood:
      # Включена ли защита от символьного спама? (true/false)
      enabled: true
      # Максимальное количество одинаковых символов подряд
      # (К примеру: "аааааааааааа" или "неееееееееет")
      max-repeating-chars: 5
      # Максимальное количество повторяющихся паттернов
      # (К напримеру: "аххахахааххах" или "еззззззкииииии")
      max-repeating-pattern: 3
      # Время кулдауна при срабатывании (в секундах)
      cooldown-seconds: 8

    # Игроки или привилегии, у которых не будет работать данный фильтр
    exceptions:
      # Список игроков, которые игнорируются при использовании спама
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при использовании спама
      groups:
        - "admin"
        - "moderator"

logs:
  file:
    spam:
      # Включен ли параметр? (true/false)
      enabled: true
      # Формат сообщения для логов в файле
      message: "[{time}] Игрок {player} спамил сообщениями: {reason}"
      # Настройка автоматической очистки файла логов
      cleanup:
        # Включен ли параметр? (true/false)
        enabled: true
        # Режим очистки файла логов:
        #   truncate — Полностью очищает файл
        #   remove-oldest — Удаляет строки старше "retention-period"
        #   keep-latest — Сохраняет только последние "max-lines" строк
        mode: "remove-oldest"
        # Максимальное количество строк в файле логов
        max-lines: 10000
        # Период хранения строк в файле логов
        # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
        retention-period: "7d"

notifications:
  # Настройка уведомлений при обнаружении спама
  spam:
    # Уведомления для самого игрока, который спамил сообщениями
    player:
      # Уведомления при срабатывании общей задержки
      general-cooldown:
        # {remaining} — длительность по settings.time-format в config.yml (напр. "1м. 30с.")
        - "[message] &#FB8808▶ Стоять! &fПодожди ещё &#FB8808{remaining} &fперед отправкой!"
        - "[title] &#FB8808▶ Стоять!\n&#FB8808◆ &fХватит &#FB8808спамить &fсообщениями"
        - "[actionbar] &#FB8808◆ Стоп! &fПодожди ещё &#FB8808{remaining} &fдля отправки сообщения снова!"
        - "[sound] ENTITY_VILLAGER_NO"
      # Уведомления при срабатывании защиты от похожих сообщений
      similar-message-cooldown:
        - "[message] &#FB8808◆ Стоять! &fТвоё сообщение &#FB8808слишком похоже &fна предыдущее, подожди ещё &#FB8808{remaining}&f."
        - "[title] &#FB8808▶ Погоди!\n&#FB8808◆ &fПодожди ещё &#FB8808{remaining} &fперед отправкой..."
        - "[actionbar] &#FB8808◆ Стоп-стоп! &fТвоё сообщение очень &#FB8808похоже &fна предыдущее, &#FB8808погоди &fнемного!"
        - "[sound] ENTITY_VILLAGER_NO"
      # Уведомления при срабатывании защиты от флуда символов
      character-flood:
        - "[message] &#FB8808◆ Погоди! &fУ тебя в сообщении &#FB8808слишком много &fодинаковых символов, подожди ещё &#FB8808{remaining}&f перед повторной отправкой..."
        - "[title] &#FB8808▶ Стоп-стоп!\n&#FB8808◆ &fПрекрати &#FB8808спамить &fпохожими символами)"
        - "[actionbar] &#FB8808▶ Стоять! &fХватит &#FB8808флудить &fсимволами, подожди ещё &#FB8808{remaining}&f."
        - "[sound] ENTITY_VILLAGER_NO"
      # Уведомления, когда новичок ещё не отыграл минимальное время
      # {remaining} — формат из config.yml → settings.time-format
      new-player-chat-lock:
        - "[message] &#FB8808◆ Погоди! &fОтыграй ещё &#FB8808{remaining} &fчтобы писать в чат."
        - "[title] &#FB8808▶ Новичок!\n&#FB8808◆ &fОтыграй &#FB8808{remaining} &fперед чатом"
        - "[actionbar] &#FB8808◆ Чат откроется через &#FB8808{remaining}"
        - "[sound] ENTITY_VILLAGER_NO"
    # Уведомления для администраторов
    admin:
      - "[message] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fспамит сообщениями: &#FFA500{reason}"
      - "[sound] BLOCK_NOTE_BLOCK_PLING"
    # Уведомления в консоль
    console:
      - "[message-console] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fспамит сообщениями: &#FFA500{reason}"
    # Уведомления в Дискорд
    discord:
      # Включить ли отправку уведомлений в Дискорд? (true/false)
      enabled: false
      # Ссылка вебхука Дискорда
      webhook-url: ""
      # Формат сообщения для Дискорда
      message: "» ◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) Игрок `{player}` спамит сообщениями: `{reason}`"

punishments:
  # Настройка наказаний за спам
  spam:
    # Включены ли наказания за спам? (true/false)
    enabled: false
    # Настройка логирования наказаний в файл
    logs:
      # Включить ли запись наказаний в файл? (true/false)
      enabled: true
      # Формат сообщения для логов наказаний
      message: "[{time}] Игрок {player} (нарушений: {violations}, стадия: {stage}) был пойман на спаме"
    # Игроки или привилегии, которые не будут получать наказания
    exceptions:
      # Список игроков, которые игнорируются при наказаниях
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при наказаниях
      groups:
        - "admin"
        - "moderator"
    # Пермишен, который позволяет обходить все наказания за спам
    bypass-permission: "chatfilterplus.bypass.punishment.spam"
    # Настройка стадий наказаний
    # (В самом начале указывается число, и оно значит то, сколько игрок должен получить уведомления за спам, чтобы оно сработало)
    stages:
      1:
        actions:
          - "[console-command] kick {player} Спам в чате"
      3:
        actions:
          - "[console-command] tempmute {player} 5m Спам в чате"
      5:
        actions:
          - "[console-command] tempmute {player} 10m Спам в чате"
      7:
        actions:
          - "[console-command] tempmute {player} 20m Спам в чате"