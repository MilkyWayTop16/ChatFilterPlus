# Версия конфигурации плагина
# (Ни в коем случае не трогать данный параметр!)
config-version: 2.2

filter:
  # Настройка Анти-Капс фильтра
  caps:
    # Включен ли Анти-Капс? (true/false)
    enabled: false
    # Режим работы:
    #   block-and-notify — полностью блокирует сообщение с капсом
    #   replace-and-notify — заменяет слова с капсом на маленькие буквы и отправляет уведомление
    mode: "replace-and-notify"
    # Минимальная длина слова в буквах, при которой проверяется капс
    # Установите "-1", чтобы проверять капс в словах любой длины
    min-length: -1
    # Максимальный процент заглавных букв в слове, при котором оно считается капсом
    max-caps-percent: 70
    # Игнорировать ли цифры, знаки препинания и символы при расчёте процента капса?
    # (Рекомендуется оставить true — сильно уменьшает ложные срабатывания)
    ignore-non-letters: true

    # Приоритет при одновременном обнаружении мата и капса
    badwords-priority:
      # Режим уведомлений:
      #   badwords — отправлять только уведомление о мате
      #   caps — отправлять только уведомление о капсе
      #   both — отправлять оба уведомления
      notification-priority: "badwords"
      # Режим обработки сообщения:
      #   badwords — применять только фильтр мата
      #   caps — применять только анти-капс
      #   both — применять оба фильтра
      filter-priority: "both"

    # Приоритет при одновременном обнаружении запрещённого слова и капса
    blockedwords-priority:
      # Режим уведомлений:
      #   blockedwords — отправлять только уведомление о запрещённом слове
      #   caps — отправлять только уведомление о капсе
      #   both — отправлять оба уведомления
      notification-priority: "blockedwords"
      # Режим обработки сообщения:
      #   blockedwords — заменять только запрещённое слово
      #   caps — применять только анти-капс
      #   both — применять оба фильтра
      filter-priority: "both"

    # Список слов, которые полностью игнорируются Анти-Капсом
    whitelist:
      - "ЛОЛ"
      - "ГГ"
      - "АФК"

    # Игроки или привилегии, у которых не будет работать данный фильтр
    exceptions:
      # Список игроков, которые игнорируются при использовании капса
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при использовании капса
      groups:
        - "admin"
        - "moderator"

logs:
  file:
    caps:
      # Включен ли параметр? (true/false)
      enabled: true
      # Формат сообщения для логов в файле
      message: "[{time}] Игрок {player} использовал капс: {original-message}"
      # Настройка формата вывода сообщения для плейсхолдера {original-message}
      caps-format:
        # Разделитель для нескольких сообщений (в капсе всегда одно сообщение)
        separator: ", "
        # Формат для сообщения с капсом
        message-template: "{original-message}"
        # Специальный формат, если найдено только одно сообщение
        single-message-template: "{original-message}"
      # Настройка автоматической очистки файла логов
      cleanup:
        # Включен ли параметр? (true/false)
        enabled: true
        # Режим очистки файла логов:
        #   truncate — Полностью очищает файл
        #   remove-oldest — Удаляет строки старше "retention-period"
        #   keep-latest — Сохраняет только последние "max-lines" строк
        mode: "remove-oldest"
        # Максимальное количество строк в файле логов
        max-lines: 10000
        # Период хранения строк в файле логов
        # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
        retention-period: "7d"

notifications:
  caps:
    # Уведомления для самого игрока, который использовал капс
    player:
      - "[message] &#FB8808◆ &fСтоп! &#FB8808Не используйте &fкапс в сообщениях)"
      - "[title] &#FB8808▶ Стоять!\n&#FB8808◆ &fХватит &#FB8808использовать &fкапс в чате!"
      - "[actionbar] &#FB8808◆ &fСтоп! &#FB8808Не используйте &fкапс в своих сообщениях!"
      - "[sound] ENTITY_VILLAGER_NO"
    # Уведомления для администраторов
    admin:
      - "[message] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fиспользовал капс: &#FFA500{original-message}"
      - "[sound] BLOCK_NOTE_BLOCK_PLING"
    # Уведомления в консоль
    console:
      - "[message-console] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fиспользовал капс: &#FFA500{original-message}"
    # Уведомления в Дискорд
    discord:
      # Включить ли отправку уведомлений в Дискорд? (true/false)
      enabled: false
      # Ссылка вебхука Дискорда
      webhook-url: ""
      # Формат сообщения для Дискорда
      message: "» ◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) Игрок `{player}` использовал капс: `{original-message}`"

punishments:
  caps:
    # Включены ли наказания за капс? (true/false)
    enabled: false
    # Настройка логирования наказаний в файл
    logs:
      # Включить ли запись наказаний в файл? (true/false)
      enabled: true
      # Формат сообщения для логов наказаний
      message: "[{time}] Игрок {player} (нарушений: {violations}, стадия: {stage}) использовал капс: {original-message}"
    # Игроки или привилегии, которые не будут получать наказания
    exceptions:
      # Список игроков, которые игнорируются при наказаниях
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при наказаниях
      groups:
        - "admin"
        - "moderator"
    # Пермишен, который позволяет обходить все наказания за капс
    bypass-permission: "chatfilterplus.bypass.punishment.caps"
    # Настройка стадий наказаний
    # (В самом начале указывается число, и оно значит то, сколько игрок должен получить уведомления за капс, чтобы оно сработало)
    stages:
      1:
        actions:
          - "[console-command] kick {player} Использование капса"
      3:
        actions:
          - "[console-command] tempmute {player} 5m Использование капса"
      5:
        actions:
          - "[console-command] tempmute {player} 10m Использование капса"
      7:
        actions:
          - "[console-command] tempmute {player} 20m Использование капса"