# Версия конфигурации плагина
# (Ни в коем случае не трогать данный параметр!)
config-version: 2.3

filter:
  # Настройка фильтрации ссылок
  links:
    # Включен ли фильтр ссылок? (true/false)
    enabled: true
    # Режим работы фильтра ссылок:
    #   block-and-notify — полностью блокирует сообщение со ссылкой и отправляет уведомление
    #   replace-and-notify — заменяет ссылку на указанный текст и отправляет уведомление
    mode: "block-and-notify"
    # Текст замены для ссылок (используется только в режиме "replace-and-notify")
    replacement: "&#FB8808[Ссылка удалена]&r"
    # Регулярное выражение для определения ссылок
    regex: "(?i)(?:https?://)?[\\w\\p{L}\\-]+(?:\\.[\\w\\p{L}\\-]+){1,}"
    # Настройка белого/чёрного списка для ссылок
    list-filter:
      # Включен ли белый/чёрный список? (true/false)
      enabled: false
      # Режим работы списка:
      #   whitelist — разрешены только указанные домены, остальные запрещены
      #   blacklist — запрещены только указанные домены, остальные разрешены
      mode: "whitelist"
      # Список доменов для белого/чёрного списка
      domains:
        - "https://t.me/gornasqd"
        - "https://t.me/vkusniy_milkyway"
    # Игроки или привилегии, у которых не будет работать данный фильтр
    exceptions:
      # Список игроков, которые игнорируются при использовании ссылок
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при использовании ссылок
      groups:
        - "admin"
        - "moderator"

  # Более умная детекция ссылок и доменов
  smart-detection:
    # Включить умную двухэтапную проверку ссылок? (true/false)
    # (Рекомендуется оставить "true", так как параметр сильно уменьшает ложные срабатывания)
    enabled: true
    # Быстрые триггеры (Проверка без тяжёлой нормализации)
    quick-triggers:
      - "http"
      - "https"
      - "www"
      - "bitly"
      - "clck"
      - "discord"
      - "telegram"
      - "youtube"
      - "youtu"
      - "twitch"
      - "дискорд"
      - "телеграм"
    # Реальные TLD (Только эти считаются ссылками после самой нормализации)
    # TLD (Иначе Top‑Level Domain) — Это, можно сказать, последняя часть домена, который идёт после точки
    # (Например, в адресе "example.com" TLD — это ".com", а в "site.ru" — ".ru")
    tlds:
      - "ru"
      - "com"
      - "net"
      - "org"
      - "io"
      - "me"
      - "gg"
      - "tv"
      - "cc"
      - "us"
      - "su"
      - "ru"
      - "py"
      - "pf"
      - "uk"
      - "de"
      - "fr"
      - "jp"
      - "cn"
      - "co"
      - "info"
      - "biz"
      - "xyz"
      - "online"
      - "shop"
      - "site"
      - "tech"
      - "store"
      - "app"
      - "blog"
      - "dev"
      - "live"
      - "cloud"
      - "wiki"
      - "news"
      - "media"
      - "fun"
      - "club"
      - "vip"
      - "bet"
      - "stream"
      - "chat"
      - "email"
      - "life"
      - "company"
      - "systems"
      - "solutions"
      - "community"
      - "academy"
      - "center"
      - "group"
      - "tools"
      - "today"
      - "best"
      - "win"
      - "digital"
      - "agency"
      - "page"
      - "art"
      - "team"
      - "top"
      - "pro"
      - "space"
      - "website"
      - "host"
      - "icu"
      - "games"
      - "world"
      - "link"
      - "click"
    # Минимальное количество частей домена
    # (Например, вот так: "домен.tld" равен двум частям)
    min-domain-parts: 2
    # Требовать реальный TLD? (true/false)
    # (Если установлено "true", то только известные TLD считаются ссылками или доменами)
    require-real-tld: true

  # Второй уровень "Адаптивная Анти-Реклама"
  # Логика такая:
  #   1) Первый раз, ловит явную рекламу (различные ключевые слова + @ник / ссылка)
  #   2) После блока у игрока растёт уровень подозрения
  #   3) Повторные попытки с обходами ловятся жёстче при помощи сравнения с прошлыми попытками
  #   4) Через suspicion-ttl без нарушений уровень сбрасывается
  adaptive-ad-filter:
    # Включить адаптивную анти-рекламу? (true/false)
    enabled: true
    # Режим максимальной точности
    # (Рекомендуется оставить "true" для более точной фильтрации за счёт некоторых новых функций)
    high-precision-mode: true
    # Минимальный процент счёта для блокировки рекламы (Кроме явных ссылок)
    min-score-to-block: 70
    # Сколько действует повышенное подозрение после нарушения
    # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
    suspicion-ttl: "3m"
    # Сколько прошлых рекламных сообщений помнить на игрока
    history-size: 10
    # Максимальный уровень подозрения
    # (То есть это работает так, что чем выше, тем жёстче)
    max-level: 5
    # Порог похожести в процентах с прошлой рекламой на уровне 1–2
    elevated-similarity-percent: 68
    # Порог похожести в процентах на уровне 3+
    high-similarity-percent: 55
    # Сравнивать новые сообщения с прошлыми рекламными (похожесть)
    track-similarity: true
    # При адаптивном срабатывании считать нарушением всё сообщение целиком?
    block-whole-message: true
    # Ключевые слова/фразы рекламы
    promo-keywords:
      - "тгк"
      - "tgk"
      - "тг"
      - "tg"
      - "телега"
      - "телеграм"
      - "телеграмм"
      - "telegram"
      - "дс"
      - "дискорд"
      - "discord"
      - "dsc"
      - "подпишись"
      - "подписка"
      - "ссылка"
      - "ссылку"
      - "переходи"
      - "лучший тгк"
      - "мой тгк"
      - "наш тгк"
      - "тг канал"
      - "тг-канал"
      - "invite"
      - "инвайт"
      - "промокод"
      - "реклама"
      - "айпи"
      - "donate"

    # Шаблоны формы рекламы
    # (Не заменяет никак "smart-detection" и "promo-keywords", а работает вместе с ними)
    #
    # Логика такая:
    #   1) Сообщение сравнивается с шаблонами из "templates"
    #   2) Срабатывает только если форма похожа и есть цель рекламы
    #
    phrase-templates:
      # Включить доп. слой шаблонов формы рекламы? (true/false)
      # (Рекомендуется оставить "true", так как он намного точнее ловит типичную рекламу)
      enabled: true
      # Минимальная похожесть формы сообщения на шаблон в процентах (после вырезания цели)
      # (Чем выше, тем меньше ложных срабатываний и чуть слабее обход)
      min-similarity-percent: 72
      # Минимальная длина сообщения в символах для проверки шаблонами
      # (Короткие фразы вроде "тгк" или "discord" сюда не попадают)
      min-message-length: 12
      # Счёт нарушения при срабатывании шаблона
      # (Должен быть не ниже "min-score-to-block" выше, иначе "hit" отфильтруется)
      hit-score: 78
      # Список шаблонов-форм
      #
      # Плейсхолдеры внутри параметра (Обязателен ровно один на строку):
      #   {name} — никнейм без "@" (считаются: a-z, 0-9, _, - и другие), не короче 4 букв
      #   {@name} — юзернейм только вместе с символом "@"
      #   {domain} — домен
      #
      # (Не добавляйте шаблоны без плейсхолдера, так как они будут проигнорированы)
      templates:
        - "самый лучший тгк {name}"
        - "самый топовый тгк {name}"
        - "лучший тгк {name}"
        - "топовый тгк {name}"
        - "мой тгк {name}"
        - "наш тгк {name}"
        - "тг канал {name}"
        - "тг-канал {name}"
        - "телеграм канал {name}"
        - "телега {name}"
        - "подпишись на тгк {name}"
        - "заходи в тгк {name}"
        - "переходи в тгк {name}"
        - "ссылка на тгк {name}"
        - "скидываю тгк {name}"
        - "в тгк {name}"
        - "самый лучший tgc {name}"
        - "лучший tgc {name}"
        - "топовый tgc {name}"
        - "самый лучший tgk {name}"
        - "лучший tgk {name}"
        - "топовый tgk {name}"
        - "telegram {@name}"
        - "discord {@name}"
        - "дискорд {@name}"
        - "дс {@name}"
        - "наш дискорд {@name}"
        - "наш дс {@name}"
        - "заходи в дискорд {@name}"
        - "заходи в дс {@name}"
        - "discord сервер {@name}"
        - "дискорд сервер {@name}"
        - "invite {@name}"
        - "инвайт {@name}"
        - "топовый гриферский сервер {domain}"
        - "лучший гриферский сервер {domain}"
        - "гриферский сервер {domain}"
        - "топовый анархо сервер {domain}"
        - "лучший анархия сервер {domain}"
        - "анархо сервер {domain}"
        - "анархия сервер {domain}"
        - "ванильный сервер {domain}"
        - "выживание сервер {domain}"
        - "топовый сервер {domain}"
        - "новый сервер {domain}"
        - "открылся сервер {domain}"
        - "заходи на сервер {domain}"
        - "залетайте на сервер {domain}"
        - "играй на сервере {domain}"
        - "ip сервера {domain}"
        - "айпи сервера {domain}"
        - "ip {domain}"
        - "айпи {domain}"
        - "наш сервер {domain}"
        - "лучший сервер {domain}"
        - "заходи на {domain}"

logs:
  file:
    links:
      # Включен ли параметр? (true/false)
      enabled: true
      # Формат сообщения для логов в файле
      message: "[{time}] Игрок {player} попытался отправить ссылку(и): {links}"
      # Настройка формата вывода списка ссылок для плейсхолдера {links}
      links-format:
        # Разделитель для нескольких ссылок
        separator: ", "
        # Формат для каждой ссылки
        link-template: "{link}"
        # Специальный формат, если найдена только одна ссылка
        single-link-template: "{link}"
      # Настройка автоматической очистки файла логов
      cleanup:
        # Включен ли параметр? (true/false)
        enabled: true
        # Режим очистки файла логов:
        #   truncate — Полностью очищает файл
        #   remove-oldest — Удаляет строки старше "retention-period"
        #   keep-latest — Сохраняет только последние "max-lines" строк
        mode: "remove-oldest"
        # Максимальное количество строк в файле логов
        max-lines: 10000
        # Период хранения строк в файле логов
        # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
        retention-period: "7d"

notifications:
  links:
    # Уведомления для самого игрока, который отправил ссылку
    player:
      - "[message] &#FB8808◆ Стоп! &fХватит уже &#FB8808что-то рекламировать &fв чате!"
      - "[title] &#FB8808▶ &fСтоп-стоп!\n&#FB8808◆ &fЧто &#FB8808ты там &fрекламируешь?)"
      - "[actionbar] &#FB8808◆ &fСтоять! &fТак, &#FB8808хватит &fотправлять ссылки или рекламировать что-либо в чате!"
      - "[sound] ENTITY_VILLAGER_NO"
    # Уведомления для администраторов
    admin:
      - "[message] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fпопытался отправить ссылку(и): &#FFA500{links}"
      - "[sound] BLOCK_NOTE_BLOCK_PLING"
    # Уведомления в консоль
    console:
      - "[message-console] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fпопытался отправить ссылку(и): &#FFA500{links}"
    # Уведомления в Дискорд
    discord:
      # Включить ли отправку уведомлений в Дискорд? (true/false)
      enabled: false
      # Ссылка вебхука Дискорда
      webhook-url: ""
      # Формат сообщения для Дискорда
      message: "» ◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) Игрок `{player}` пытался отправить ссылку(и) или рекламу: `{links}`"

punishments:
  links:
    # Включены ли наказания за отправку ссылок? (true/false)
    enabled: false
    # Настройка логирования наказаний в файл
    logs:
      # Включить ли запись наказаний в файл? (true/false)
      enabled: true
      # Формат сообщения для логов наказаний
      message: "[{time}] Игрок {player} (нарушений: {violations}, стадия: {stage}) отправил ссылку(и): {links}"
    # Игроки или привилегии, которые не будут получать наказания
    exceptions:
      # Список игроков, которые игнорируются при наказаниях
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при наказаниях
      groups:
        - "admin"
        - "moderator"
    # Пермишен, который позволяет обходить все наказания за ссылки
    bypass-permission: "chatfilterplus.bypass.punishment.links"
    # Настройка стадий наказаний
    # (В самом начале указывается число, и оно значит то, сколько игрок должен получить уведомления за ссылку, чтобы оно сработало)
    stages:
      1:
        actions:
          - "[console-command] kick {player} Отправка ссылок ({links})"
      3:
        actions:
          - "[console-command] tempmute {player} 5m Нарушение чата ({links})"
      5:
        actions:
          - "[console-command] tempmute {player} 10m Нарушение чата ({links})"
      7:
        actions:
          - "[console-command] tempmute {player} 20m Нарушение чата ({links})"