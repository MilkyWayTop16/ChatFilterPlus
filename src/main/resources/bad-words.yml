# Версия конфигурации плагина
# (Ни в коем случае не трогать данный параметр!)
config-version: 2.3

filter:
  # Настройка фильтрации матерных слов
  bad-words:
    # Включен ли параметр? (true/false)
    enabled: true
    # Режим работы фильтра
    #   send-and-notify — Заменяет мат и отправляет уведомление
    #   block-and-notify — Не отправляет сообщение с матом и отправляет уведомление
    mode: "send-and-notify"
    # Уровень фильтрации слов:
    #   high — фильтрует все слова из списка words.yml, включая производные формы
    #   medium — фильтрует многие слова из списка words.yml, включая производные формы, но не настолько точно
    #   low — фильтрует только точные совпадения
    # (Рекомендуется всё-таки оставить "high", так как он самый точный)
    level: "high"
    # Символ замены (Используется только в режиме "send-and-notify")
    replacement: "*"
    # Сохранять первую и последнюю буквы при замене? (true/false)
    #   true — маскируется только середина так, что буква в самом начале и конце видна
    #   false — заменяется всё слово на тот символ, что стоит в "replacement"
    keep-edge-letters: true
    # Детектить ли фильтру маты, где русские буквы заменены на визуально похожие английские? (true/false)
    # (Например: "blya" вместо "бля", "pizda" вместо "пизда", "huy" вместо "хуй", "ebat" вместо "ебать" и тд.)
    # (Рекомендуется включать данный параметр, так как фильтр это сделает намного сильнее, потому что многие игроки пишут маты английскими буквами бля одхода)
    detect-english-lookalikes: true
    # Игроки или привилегии, у которых не будет работать данный фильтр
    exceptions:
      # Список игроков, которые игнорируются при использовании мата
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при использовании мата
      groups:
        - "admin"
        - "moderator"

logs:
  file:
    bad-words:
      # Включен ли параметр? (true/false)
      enabled: true
      # Формат сообщения для логов в файле
      message: "[{time}] Игрок {player} написал мат(ы): {words}"
      # Настройка формата вывода списка слов для плейсхолдера {words}
      words-format:
        # Разделитель для нескольких слов
        separator: ", "
        # Формат для каждого слова
        word-template: "{word}"
        # Специальный формат, если найдено только одно слово
        single-word-template: "{word}"
      # Настройка автоматической очистки файла логов
      cleanup:
        # Включен ли параметр? (true/false)
        enabled: true
        # Режим очистки файла логов:
        #   truncate — Полностью очищает файл
        #   remove-oldest — Удаляет строки старше "retention-period"
        #   keep-latest — Сохраняет только последние "max-lines" строк
        mode: "remove-oldest"
        # Максимальное количество строк в файле логов
        max-lines: 10000
        # Период хранения строк в файле логов
        # Единицы времени: s (секунды), m (минуты), h (часы), d (дни), w (недели), y (годы)
        retention-period: "7d"

notifications:
  bad-words:
    # Уведомления для самого игрока, который написал мат
    player:
      - "[message] &#FB8808▶ Стоять! &fХватит &#FB8808материться &fи &#FB8808ругаться &fв чате!"
      - "[title] &#FB8808◆ А ну-ка, цыц!\n&#FB8808▶ &fНе матерись в чате)"
      - "[actionbar] &#FB8808◆ Стоп! &fВам &#FB8808нельзя писать &fматы и ругательства )"
      - "[sound] ENTITY_VILLAGER_NO"
    # Уведомления для администраторов
    admin:
      - "[message] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fнаписал мат(ы): &#FFA500{words}"
      - "[sound] BLOCK_NOTE_BLOCK_PLING"
    # Уведомления в консоль
    console:
      - "[message-console] &#FFA500◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) &f| Игрок &#FFA500{player} &fнаписал мат(ы): &#FFA500{words}"
    # Уведомления в Дискорд
    discord:
      # Включить ли отправку уведомлений в Дискорд? (true/false)
      enabled: false
      # Ссылка вебхука Дискорда
      webhook-url: ""
      # Формат сообщения для Дискорда
      message: "» ◆ (ᴄʜᴀᴛ-ꜰɪʟᴛᴇʀ) Игрок `{player}` использовал мат(ы): `{words}`"

punishments:
  bad-words:
    # Включены ли наказания за мат? (true/false)
    enabled: false
    # Настройка логирования наказаний в файл
    logs:
      # Включить ли запись наказаний в файл? (true/false)
      enabled: true
      # Формат сообщения для логов наказаний
      message: "[{time}] Игрок {player} (нарушений: {violations}, стадия: {stage}) написал мат(ы): {words}"
    # Игроки или привилегии, которые не будут получать наказания
    exceptions:
      # Список игроков, которые игнорируются при наказаниях
      players:
        - "Player1"
        - "Player2"
      # Список привилегий, которые игнорируются при наказаниях
      groups:
        - "admin"
        - "moderator"
    # Пермишен, который позволяет обходить все наказания за мат
    bypass-permission: "chatfilterplus.bypass.punishment.badwords"
    # Настройка стадий наказаний
    # (В самом начале указывается число, и оно значит то, сколько игрок должен получить уведомления за мат, чтобы оно сработало)
    stages:
      1:
        actions:
          - "[console-command] kick {player} Использование мата ({words})"
      3:
        actions:
          - "[console-command] tempmute {player} 5m Нарушение чата ({words})"
      5:
        actions:
          - "[console-command] tempmute {player} 10m Нарушение чата ({words})"
      7:
        actions:
          - "[console-command] tempmute {player} 20m Нарушение чата ({words})"
          -
